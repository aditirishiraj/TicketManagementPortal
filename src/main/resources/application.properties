spring.application.name=ticket-management

spring.datasource.url=jdbc:postgresql://localhost:5432/ticket_management
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=8080
jwt.secret=ThisIsAMuchLongerSecretKeyForJWTSigningThatMeetsTheMinimumByteLengthRequirementForHS384AndHS512Algorithms
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

file.upload-dir=uploads